<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>

    *{
        margin:0;
        padding:0;
    }

    body{
        display:flex;
        flex-direction: column;
        height: 100vh;
        width:100vw;
        justify-content: center;
        align-items: center;
    }


    .main_container{
        margin:20px;
        gap:10px;
        align-items: flex-start;
        display:flex;
        flex-direction:column;
        
    }

    .calculate_button{
        background-color: blue;
        color:white;
        border-radius : 20px;
        border:none;
        padding:10px;
        
    }

    #history{
        display:none;
    }

    li{
        list-style-type: none;
    }

</style>


</head>
<body>
    

    <div class="main_container">

        <label id="input_label" for="input_area" style="font-size:20px;">Enter the expression here : </label>
        <input type="text" id="input_area" style="border-radius:20px; padding:10px;">
        <button id ="calculate_button" class="calculate_button" type="button">Calculate</button>
        <button type="button" id="history_button" class="calculate_button">Show History</button>

        <ul id="history">

            
        </ul>

        
    </div>


    <script>


      const btn = document.getElementById("calculate_button");
      const input_area = document.getElementById("input_area");
      const input_label = document.getElementById("input_label");
      const history = document.getElementById("history");
      const history_button = document.getElementById("history_button");


      btn.addEventListener('click' , ()=>{

        let exp = input_area.value 

        if(exp){

          try{
            let result = eval(exp);
            input_label.textContent = "The answer is : ";
            input_area.value = result;

            const new_entry = document.createElement("li");
            new_entry.textContent = exp + " : " + result;
            history.appendChild(new_entry);

            
    
            setTimeout(()=>{
              input_area.value = "";
              input_label.textContent = "Enter the expression here : ";
            } , 2000);
          }

          catch(e){
            input_area.value = "Please enter valid expression only";

            setTimeout(()=>{
              input_area.value = "";
            } , 1000);
          }
            
        }
          
        });

      history_button.addEventListener('click' , ()=>{

        if(history.style.display == "none"){
          history.style.display = "block";
          history_button.textContent = "Hide History";
        }
        else{
          history.style.display = "none";
          history_button.textContent = "Show History";
        }
        
      })
        

        
       

      

    </script>

    
</body>
</html>
